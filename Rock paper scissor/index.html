<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK_PAPER_SCISSOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices" >
        <div class="choice" id="rock">
            <img src="Javascript-project/Rock paper scissor/rock.png" />
        </div>
        <div class="choice" id="paper">
            <img src="Javascript-project/Rock paper scissor/paper.png" />
        </div>
        <div class="choice" id="scissors">
            <img src="Javascript-project/Rock paper scissor/scissors.png" />
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>user</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
